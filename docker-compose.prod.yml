services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: openbudget_db_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openbudget}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-openbudget}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "127.0.0.1:5432:5432"  # Only accessible from localhost
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openbudget} -d ${POSTGRES_DB:-openbudget}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - openbudget_network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: openbudget_api_prod
    restart: always
    environment:
      # Database
      POSTGRES_HOST: db
      POSTGRES_USER: ${POSTGRES_USER:-openbudget}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-openbudget}
      DATABASE_URL: postgresql://${POSTGRES_USER:-openbudget}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-openbudget}
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-20}
      DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW:-10}
      # Application
      APP_NAME: ${APP_NAME:-OpenBudget API}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      DEBUG: "False"
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      # Security
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      # CORS
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-["https://yourdomain.com"]}
      # Seed
      RUN_SEED: ${RUN_SEED:-false}
      # Upload
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-10}
    volumes:
      - ./uploads:/app/uploads
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - openbudget_network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
volumes:
  postgres_data_prod:
    name: openbudget_postgres_data_prod

networks:
  openbudget_network:
    name: openbudget_network_prod
    driver: bridge
