services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: openbudget_db_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: openbudget
      POSTGRES_PASSWORD: openbudget_dev_password
      POSTGRES_DB: openbudget
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openbudget -d openbudget"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - openbudget_network

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openbudget_api_dev
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://openbudget:openbudget_dev_password@db:5432/openbudget
      DATABASE_POOL_SIZE: 20
      DATABASE_MAX_OVERFLOW: 0
      APP_NAME: OpenBudget API
      APP_VERSION: 1.0.0
      DEBUG: "True"
      API_V1_PREFIX: /api/v1
      SECRET_KEY: dev-secret-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      FRONTEND_URL: http://localhost:3000
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./uploads:/app/uploads
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 5 &&
        echo 'Running migrations...' &&
        alembic upgrade head &&
        echo 'Starting application...' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
      "
    networks:
      - openbudget_network

volumes:
  postgres_data_dev:
    name: openbudget_postgres_data_dev

networks:
  openbudget_network:
    name: openbudget_network_dev
    driver: bridge
